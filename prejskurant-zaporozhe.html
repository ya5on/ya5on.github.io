<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Прейскурант Запорожье | Химчистка LaVanda</title>
    <link rel="shortcut icon" href="/dist/img/favicon.ico">
    <link rel="apple-touch-icon" href="/dist/img/mstile-150x150.png">
    <meta name="description" content="Широкий спектр услуг самого высокого уровня по чистке и реставрации вещей">
    <meta name="keywords"
          content="химчистка, Запорожье, Энергодар, Лаванда, LaVanda, чистка, вещи, ремонт вещей, реставрация сумок, чистка обуви, стирка белья">

    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
          integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous"/>
    <link rel="stylesheet" href="/dist/css/style.css">
</head>
<body>
<section class="main" style='background-image: url("/dist/img/prejskurant-page/bg-price-3.jpg")'>
    <div class="container">
        <div class="main__content">
            <div class="main__inner">
                <a href="/">
                    <img class="logo-head" src="/dist/img/logo.svg" alt="logo">
                </a>
                <h1>ПРЕЙСКУРАНТ ЗАПОРОЖЬЕ</h1>
                <button class="button">
                    <span class="button__label">ВЫЗОВ КУРЬЕРА</span>
                </button>
            </div>
        </div>
    </div>
</section>
<section class="prejskurant">
    <div class="container-min">
        <div class="prejskurant__items">
            <div class="prejskurant__item">
                <button class="prejskurant__btn">Чистка одежды <img src="/dist/img/prejskurant-page/icon-plus.svg" alt="icon"></button>
            </div>
            <div class="prejskurant__item">
                <button class="prejskurant__btn">Чистка обуви <img src="/dist/img/prejskurant-page/icon-plus.svg" alt="icon"></button>
            </div>
            <div class="prejskurant__item">
                <button class="prejskurant__btn">Чистка сумок <img src="/dist/img/prejskurant-page/icon-plus.svg" alt="icon"></button>
            </div>
            <div class="prejskurant__item">
                <button class="prejskurant__btn">Чистка аксессуаров <img src="/dist/img/prejskurant-page/icon-plus.svg" alt="icon"></button>
            </div>
            <div class="prejskurant__item">
                <button class="prejskurant__btn">Чистка домашнего текстиля <img src="/dist/img/prejskurant-page/icon-plus.svg" alt="icon"></button>
            </div>
            <div class="prejskurant__item">
                <button class="prejskurant__btn">Реставрация и ремонт <img src="/dist/img/prejskurant-page/icon-plus.svg" alt="icon"></button>
            </div>
            <div class="prejskurant__item">
                <button class="prejskurant__btn">Отдельные услуги <img src="/dist/img/prejskurant-page/icon-plus.svg" alt="icon"></button>
            </div>
            <div class="prejskurant__item">
                <button class="prejskurant__btn">Скидки и наценки <img src="/dist/img/prejskurant-page/icon-plus.svg" alt="icon"></button>
            </div>
        </div>
    </div>

</section>
</body>
